<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Game Shop | Official</title>
    
    <link rel="icon" type="image/png" href="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg?raw=true">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        body { background: #080a0f; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; background-image: radial-gradient(circle at top right, #1e293b, #080a0f); min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .active-tab { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
        .game-btn { transition: 0.3s; border: 1px solid #1e293b; color: #94a3b8; font-size: 11px; font-weight: bold; }
        .package-card { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); background: rgba(15, 23, 42, 0.6); }
        .package-card:hover { transform: translateY(-3px); border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .selected-pkg { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.2) !important; }
        #toast { visibility: hidden; min-width: 200px; background: #3b82f6; color: white; border-radius: 8px; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; font-weight: bold; text-align: center; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div id="toast">Copied!</div>

    <header class="text-center mb-8 pt-4">
        <img src="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg?raw=true" alt="Logo" class="w-24 h-24 mx-auto rounded-full border-2 border-blue-500 p-1 shadow-[0_0_20px_rgba(59,130,246,0.4)] mb-4 object-cover">
        <h1 class="text-3xl font-bold tracking-tighter text-white uppercase" style="font-family: 'Orbitron';">CASA GAME SHOP</h1>
        <p class="text-[10px] text-blue-400 tracking-[0.3em] font-bold uppercase mt-1">Professional Game Top-up</p>
    </header>

    <nav class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
        <button onclick="switchGame('mlbb')" id="tab-mlbb" class="game-btn active-tab px-6 py-2 rounded-xl flex-none uppercase">Mobile Legends</button>
        <button onclick="switchGame('pubg')" id="tab-pubg" class="game-btn glass-card px-6 py-2 rounded-xl flex-none uppercase">PUBG Mobile</button>
        <button onclick="switchGame('bonus')" id="tab-bonus" class="game-btn glass-card px-6 py-2 rounded-xl flex-none uppercase">MLBB 2X Bonus</button>
    </nav>

    <section class="glass-card p-5 mb-6">
        <div class="text-[10px] text-blue-400 font-bold uppercase mb-4 tracking-widest"><i class="fas fa-id-card mr-2"></i>Account Info</div>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="userId" placeholder="Player ID" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full focus:border-blue-500 outline-none">
            <input type="text" id="zoneId" placeholder="Zone ID / Name" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full focus:border-blue-500 outline-none">
        </div>
    </section>

    <section class="mb-6">
        <div class="text-[10px] text-blue-400 font-bold uppercase mb-4 tracking-widest"><i class="fas fa-shopping-cart mr-2"></i>Select Package</div>
        <div id="package-list" class="grid grid-cols-3 gap-3 min-h-[100px]">
            </div>
    </section>

    <section class="glass-card p-5 mb-6 border-dashed border-slate-600">
        <div class="text-[10px] text-yellow-500 font-bold uppercase mb-4 tracking-widest">Payment (Click to Copy)</div>
        <div class="space-y-3">
            <div onclick="copyNum('09943106995', 'KPay')" class="flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-800 cursor-pointer hover:bg-slate-800">
                <div class="flex items-center gap-3">
                    <img src="https://www.kbzpay.com/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fblue-L.c7123311.webp&w=128&q=75" class="w-7 h-7 rounded-md" alt="KPay">
                    <span class="text-sm font-bold">09943106995</span>
                </div>
                <i class="far fa-copy text-slate-500 text-xs"></i>
            </div>
        </div>
    </section>

    <section class="glass-card p-5 mb-8">
        <label class="block w-full h-24 bg-slate-900 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer relative overflow-hidden transition hover:border-blue-500">
            <input type="file" id="slip" class="hidden" onchange="preview(event)" accept="image/*">
            <div id="upload-txt" class="flex flex-col items-center justify-center h-full text-slate-500">
                <i class="fas fa-camera text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase">Upload Payment Receipt</span>
            </div>
            <img id="previewImg" class="hidden absolute inset-0 w-full h-full object-contain p-2">
        </label>
    </section>

    <button onclick="send()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-2xl font-black text-white shadow-lg hover:scale-[1.02] active:scale-95 transition-all mb-10 uppercase tracking-widest">
        Place Order via Telegram <i class="fas fa-paper-plane ml-2"></i>
    </button>

    <footer class="text-center pb-10 opacity-30">
        <p class="text-[9px] font-bold tracking-[0.3em] uppercase">Casa Game Shop Premium v3.0</p>
    </footer>

    <script>
        let currentGame = 'mlbb';
        let selectedPkg = null;

        const allPrices = {
            mlbb: [
                {d: "11 💎", p: 900}, {d: "22 💎", p: 1800}, {d: "33 💎", p: 2700}, {d: "44 💎", p: 3500},
                {d: "56 💎", p: 4200}, {d: "86 💎", p: 5700}, {d: "112 💎", p: 7900}, {d: "172 💎", p: 11000},
                {d: "257 💎", p: 16100}, {d: "343 💎", p: 21800}, {d: "429 💎", p: 26200}, {d: "514 💎", p: 31800},
                {d: "Weekly Pass", p: 6800}, {d: "600 💎", p: 36800}, {d: "706 💎", p: 42500}, {d: "878 💎", p: 52900}
            ],
            pubg: [
                {d: "60 UC", p: 1850}, {d: "325 UC", p: 9200}, {d: "660 UC", p: 18200},
                {d: "1800 UC", p: 48500}, {d: "3850 UC", p: 93500}, {d: "8100 UC", p: 185000}
            ],
            bonus: [
                {d: "50+50 💎", p: 3900}, {d: "150+150 💎", p: 10900},
                {d: "250+250 💎", p: 17200}, {d: "500+500 💎", p: 34500}
            ]
        };

        function switchGame(game) {
            currentGame = game;
            selectedPkg = null;
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active-tab', 'glass-card'));
            document.querySelectorAll('.game-btn').forEach(b => b.classList.add('glass-card'));
            document.getElementById(`tab-${game}`).classList.add('active-tab');
            document.getElementById(`tab-${game}`).classList.remove('glass-card');
            render();
        }

        function render() {
            const list = document.getElementById('package-list');
            list.innerHTML = '';
            allPrices[currentGame].forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 package-card text-center';
                div.id = `pkg-${idx}`;
                div.onclick = () => {
                    selectedPkg = item;
                    document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected-pkg'));
                    div.classList.add('selected-pkg');
                };
                div.innerHTML = `
                    <div class="text-blue-400 font-black text-xs">${item.d}</div>
                    <div class="text-[10px] text-yellow-500 font-bold mt-2">${item.p.toLocaleString()} K</div>
                `;
                list.appendChild(div);
            });
        }

        function copyNum(num, name) {
            navigator.clipboard.writeText(num);
            const t = document.getElementById('toast');
            t.innerText = `${name} Number Copied!`;
            t.className = 'show';
            setTimeout(() => t.className = '', 3000);
        }

        function preview(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.getElementById('previewImg');
                    img.src = reader.result;
                    img.classList.remove('hidden');
                    document.getElementById('upload-txt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function send() {
            const id = document.getElementById('userId').value;
            const zone = document.getElementById('zoneId').value;
            if(!id || !zone || !selectedPkg) return alert("⚠️ အချက်အလက်များ အကုန်ဖြည့်စွက်ပေးပါ။");
            const msg = `Game: ${currentGame.toUpperCase()}%0AItem: ${selectedPkg.d}%0APrice: ${selectedPkg.p} Ks%0AID: ${id} (${zone})%0A---%0APayment Slip attached.`;
            window.location.href = `https://t.me/Casa4Ev1?text=${msg}`;
        }

        // App ပွင့်လာတာနဲ့ MLBB စျေးနှုန်းတွေကို တန်းပြပေးရန်
        window.onload = render;
    </script>
</body>
</html>
