        :root { --primary: #3b82f6; --bg: #f8fafc; --card: #ffffff; }

        .nav-pill { white-space: nowrap; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: 0.2s; border: 1px solid #e2e8f0; background: white; }
        .nav-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .item-card.selected::after { content: '\f058'; font-family: 'Font Awesome 5 Free'; font-weight: 900; position: absolute; top: 8px; right: 8px; color: var(--primary); font-size: 16px; }

        .input-group { background: white; border: 1px solid #e2e8f0; border-radius: 12px; transition: 0.2s; }
        .input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 16px; border-top: 1px solid #e2e8f0; z-index: 50; display: flex; justify-content: center; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }

            if(catNotes[cat]) { info.innerText = catNotes[cat]; info.classList.remove('hidden'); }

            render();
        }

        function render() {
            const list = document.getElementById('package-list');

                    document.getElementById('previewImg').classList.remove('hidden');

            }
