<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Game Shop | Official</title>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/your-logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        body { background: #080a0f; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; background-image: radial-gradient(circle at top right, #1e293b, #080a0f); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .active-tab { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .sub-tab { font-size: 10px; padding: 6px 12px; border-radius: 8px; border: 1px solid #1e293b; color: #94a3b8; transition: 0.3s; }
        .sub-tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .package-card { transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .package-card:hover { transform: translateY(-3px); border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        #toast { visibility: hidden; min-width: 200px; background: #3b82f6; color: white; border-radius: 8px; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div id="toast">Copied!</div>

    <header class="text-center mb-8 pt-4">
        <img src="https://i.imgur.com/your-logo.png" alt="Logo" class="w-24 h-24 mx-auto rounded-full border-2 border-blue-500 p-1 shadow-[0_0_20px_rgba(59,130,246,0.4)] mb-4 object-cover">
        <h1 class="text-3xl font-bold tracking-tighter text-white uppercase" style="font-family: 'Orbitron';">CASA GAME SHOP</h1>
        <p class="text-[10px] text-blue-400 tracking-[0.3em] font-bold uppercase">Professional Game Top-up</p>
    </header>

    <section class="glass-card p-5 mb-6">
        <div class="text-[10px] text-blue-400 font-bold uppercase mb-4 tracking-widest"><i class="fas fa-id-card mr-2"></i>Account Info</div>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="userId" placeholder="Player ID" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full focus:border-blue-500 outline-none">
            <input type="text" id="zoneId" placeholder="Zone ID" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full focus:border-blue-500 outline-none">
        </div>
    </section>

    <section class="mb-6">
        <div class="flex items-center justify-between mb-4">
            <div class="text-[10px] text-blue-400 font-bold uppercase tracking-widest"><i class="fas fa-gem mr-2"></i>Select Items</div>
            <div class="flex gap-1" id="sub-tabs">
                <button onclick="switchType('std')" id="tab-std" class="sub-tab active">DIAMONDS</button>
                <button onclick="switchType('bundle')" id="tab-bundle" class="sub-tab">BUNDLES</button>
                <button onclick="switchType('bonus')" id="tab-bonus" class="sub-tab">2X BONUS</button>
            </div>
        </div>
        <div id="package-list" class="grid grid-cols-3 gap-3">
            </div>
    </section>

    <section class="glass-card p-5 mb-6">
        <div class="text-[10px] text-yellow-500 font-bold uppercase mb-4 tracking-widest">Payment (Click to Copy)</div>
        <div class="space-y-3">
            <div onclick="copyNum('09786xxxxxx', 'KPay')" class="flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-800 cursor-pointer hover:bg-slate-800">
                <div class="flex items-center gap-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/KBZ_Pay_logo.png" class="w-6 h-6">
                    <span class="text-sm font-bold">09786xxxxxx</span>
                </div>
                <i class="far fa-copy text-slate-500 text-xs"></i>
            </div>
        </div>
    </section>

    <section class="glass-card p-5 mb-8">
        <label class="block w-full h-24 bg-slate-900 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer relative overflow-hidden">
            <input type="file" id="slip" class="hidden" onchange="preview(event)" accept="image/*">
            <div id="upload-txt" class="flex flex-col items-center justify-center h-full text-slate-500">
                <i class="fas fa-camera mb-1"></i>
                <span class="text-[10px] font-bold">UPLOAD RECEIPT</span>
            </div>
            <img id="previewImg" class="hidden absolute inset-0 w-full h-full object-contain p-2">
        </label>
    </section>

    <button onclick="send()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-2xl font-black text-white shadow-lg hover:scale-[1.02] active:scale-95 transition-all mb-10">
        ORDER VIA TELEGRAM <i class="fas fa-paper-plane ml-2"></i>
    </button>

    <script>
        let currentType = 'std';
        let selectedPkg = null;

        const prices = {
            std: [
                {d: 11, p: 900}, {d: 22, p: 1800}, {d: 33, p: 2700}, {d: 44, p: 3500},
                {d: 56, p: 4200}, {d: 86, p: 5700}, {d: 112, p: 7900}, {d: 172, p: 11000},
                {d: 257, p: 16100}, {d: 343, p: 21800}, {d: 429, p: 26200}, {d: 514, p: 31800},
                {d: 600, p: 36800}, {d: 706, p: 42500}, {d: 878, p: 52900}, {d: 963, p: 57800},
                {d: 1049, p: 63300}, {d: 1135, p: 68500}, {d: 1412, p: 83800}, {d: 2195, p: 126500},
                {d: 2901, p: 168500}, {d: 3688, p: 211500}, {d: 5532, p: 319800}, {d: 9288, p: 529800}
            ],
            bundle: [
                {d: "Value Pack", p: 1200}, {d: "Weekly Elite", p: 3600},
                {d: "Monthly Epic", p: 17300}, {d: "Weekly Pass", p: 6800}
            ],
            bonus: [
                {d: "50+50", p: 3900}, {d: "150+150", p: 10900},
                {d: "250+250", p: 17200}, {d: "500+500", p: 34500}
            ]
        };

        function switchType(type) {
            currentType = type;
            selectedPkg = null;
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('package-list');
            list.innerHTML = '';
            prices[currentType].forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 package-card text-center';
                div.id = `pkg-${idx}`;
                div.onclick = () => {
                    selectedPkg = item;
                    document.querySelectorAll('.package-card').forEach(c => c.style.borderColor = 'transparent');
                    div.style.borderColor = '#3b82f6';
                };
                div.innerHTML = `
                    <div class="text-blue-400 font-black text-xs">${item.d}</div>
