<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Game Shop | Official</title>
    
    <link rel="icon" type="image/png" href="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background-color: #080a0f; 
            color: #e2e8f0; 
            font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at top right, #1e293b, #080a0f);
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px;
        }
        .active-tab { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .package-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .package-card:hover { transform: translateY(-5px); border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        input:focus { outline: none; border-color: #3b82f6; }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 200px; background: #3b82f6; color: white; border-radius: 8px; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div id="toast">Copied!</div>

    <header class="text-center mb-8 pt-4">
        <div class="relative inline-block">
            <img src="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg" alt="Casa Logo" class="w-24 h-24 mx-auto rounded-full border-2 border-blue-500 p-1 shadow-[0_0_20px_rgba(59,130,246,0.5)] mb-4 object-cover">
            <span class="absolute bottom-4 right-1 w-5 h-5 bg-green-500 border-4 border-[#080a0f] rounded-full"></span>
        </div>
        <h1 class="text-3xl font-bold tracking-tighter text-white neon-text uppercase" style="font-family: 'Orbitron';">CASA GAME SHOP</h1>
        <p class="text-[10px] text-blue-400 tracking-[0.3em] font-bold mt-1 uppercase">Official Top-up Service</p>
    </header>

    <nav class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
        <button onclick="changeGame('mlbb')" id="tab-mlbb" class="active-tab px-6 py-2 rounded-xl font-bold text-xs flex-none">MLBB</button>
        <button onclick="changeGame('pubg')" id="tab-pubg" class="glass-card px-6 py-2 rounded-xl font-bold text-xs flex-none text-gray-400">PUBG</button>
        <button onclick="changeGame('ff')" id="tab-ff" class="glass-card px-6 py-2 rounded-xl font-bold text-xs flex-none text-gray-400">FREE FIRE</button>
    </nav>

    <section class="glass-card p-5 mb-6">
        <div class="flex items-center gap-2 mb-4 text-blue-400 font-bold text-xs uppercase">
            <i class="fas fa-user-tag"></i> <span>Account Info</span>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="userId" placeholder="Player ID" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full">
            <input type="text" id="zoneId" placeholder="Zone/Name" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-sm font-bold w-full">
        </div>
    </section>

    <section class="mb-6">
        <div class="flex items-center gap-2 mb-4 text-blue-400 font-bold text-xs uppercase">
            <i class="fas fa-box-open"></i> <span>Select Package</span>
        </div>
        <div id="package-list" class="grid grid-cols-3 gap-3">
            </div>
    </section>

    <section class="glass-card p-5 mb-6 border-dashed border-slate-600">
        <div class="text-xs font-bold text-yellow-500 mb-4 uppercase">Payment (Click to Copy)</div>
        <div class="space-y-3">
            <div onclick="copyNum('09786xxxxxx', 'KPay')" class="flex items-center justify-between bg-slate-900/80 p-3 rounded-xl border border-slate-700 cursor-pointer">
                <div class="flex items-center gap-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/KBZ_Pay_logo.png" class="w-6 h-6">
                    <span class="text-sm font-bold">09786xxxxxx</span>
                </div>
                <i class="far fa-copy text-slate-500 text-xs"></i>
            </div>
            <div onclick="copyNum('09965xxxxxx', 'Wave')" class="flex items-center justify-between bg-slate-900/80 p-3 rounded-xl border border-slate-700 cursor-pointer">
                <div class="flex items-center gap-3">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple122/v4/3d/8c/fd/3d8cfd9e-1087-0b16-953b-f7f502d90610/AppIcon-0-0-1x_U007emarketing-0-0-0-7-0-0-sRGB-0-0-0-GLES2_U002c0-512MB-85-220-0-0.png/512x512bb.jpg" class="w-6 h-6">
                    <span class="text-sm font-bold">09965xxxxxx</span>
                </div>
                <i class="far fa-copy text-slate-500 text-xs"></i>
            </div>
        </div>
    </section>

    <section class="glass-card p-5 mb-8">
        <div class="text-xs font-bold text-purple-400 mb-4 uppercase">Upload Slip</div>
        <label class="block w-full h-24 bg-slate-900/50 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer overflow-hidden relative">
            <input type="file" id="slip" class="hidden" onchange="preview(event)" accept="image/*">
            <div id="upload-txt" class="flex flex-col items-center justify-center h-full text-slate-500">
                <i class="fas fa-image mb-1"></i>
                <span class="text-[10px] font-bold">SELECT RECEIPT</span>
            </div>
            <img id="previewImg" class="hidden absolute inset-0 w-full h-full object-contain p-2">
        </label>
    </section>

    <button onclick="sendOrder()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-2xl font-black text-white shadow-[0_10px_20px_rgba(59,130,246,0.3)] hover:scale-[1.02] active:scale-95 transition-all mb-10">
        SEND ORDER TO TELEGRAM <i class="fas fa-paper-plane ml-2"></i>
    </button>

    <footer class="text-center pb-8 opacity-40">
        <p class="text-[8px] font-bold tracking-[0.5em] uppercase">Casa Game Shop Premium v2.0</p>
    </footer>

    <script>
        let selectedGame = 'mlbb';
        let selectedPackage = null;

        const prices = {
            mlbb: [
                {d: 11, p: 900}, {d: 56, p: 4300}, {d: 112, p: 8100}, 
                {d: 257, p: 16500}, {d: 706, p: 43500}, {d: "Weekly Pass", p: 6800}
            ],
            pubg: [
                {d: 60, p: 1850}, {d: 325, p: 9200}, {d: 660, p: 18200}, {d: 1800, p: 48500}
            ],
            ff: [
                {d: 100, p: 2400}, {d: 210, p: 4700}, {d: 530, p: 11200}
            ]
        };

        function changeGame(game) {
            selectedGame = game;
            selectedPackage = null;
            document.querySelectorAll('nav button').forEach(btn => btn.className = 'glass-card px-6 py-2 rounded-xl font-bold text-xs flex-none text-gray-400');
            document.getElementById(`tab-${game}`).className = 'active-tab px-6 py-2 rounded-xl font-bold text-xs flex-none';
            render();
        }

        function render() {
            const list = document.getElementById('package-list');
            list.innerHTML = '';
            prices[selectedGame].forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 package-card text-center';
                div.id = `item-${idx}`;
                div.onclick = () => {
                    selectedPackage = item;
                    document.querySelectorAll('.package-card').forEach(c => c.style.borderColor = 'rgba(255,255,255,0.05)');
                    div.style.borderColor = '#3b82f6';
                };
                div.innerHTML = `
                    <div class="text-blue-400 font-black text-sm">${item.d}</div>
                    <div class="text-xs text-yellow-500 font-bold mt-1">${item.p.toLocaleString()} K</div>
                `;
                list.appendChild(div);
            });
        }

        function copyNum(num, name) {
            navigator.clipboard.writeText(num);
            const toast = document.getElementById('toast');
            toast.innerText = `${name} Number Copied!`;
            toast.className = 'show';
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        function preview(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.getElementById('previewImg');
                    img.src = reader.result;
                    img.classList.remove('hidden');
                    document.getElementById('upload-txt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function sendOrder() {
            const id = document.getElementById('userId').value;
            const zone = document.getElementById('zoneId').value;
            if(!id || !zone || !selectedPackage) return alert("Fill all details!");
            
            const msg = `Order: ${selectedGame.toUpperCase()}%0AItem: ${selectedPackage.d}%0APrice: ${selectedPackage.p} Ks%0AID: ${id} (${zone})%0A---%0APayment Slip attached below.`;
            window.location.href = `https://t.me/Casa4Ev1?text=${msg}`;
        }

        render();
    </script>
</body>
</html>
